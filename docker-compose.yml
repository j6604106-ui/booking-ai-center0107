services:
  tourism_platform:
    build: .
    container_name: tourism_platform
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KB_DIR=/kb_data
      - KNOWLEDGE_INDEX_PATH=/app/generated/knowledge_index.json
      - KNOWLEDGE_BASE_URL=${KNOWLEDGE_BASE_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - LLM_API_KEY=${LLM_API_KEY:-c3oqe1veKq4DIY4eFqJVUXNRgVZgMiT9J6+P3+ktGQY=}
      - LLM_MODEL=${LLM_MODEL:-openrouter/openrouter/free}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:4000}
    depends_on:
      - redis
    volumes:
      - ./knowledge_bases:/kb_data

  redis:
    image: redis:6.2
    container_name: redis_tourism
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:2
    container_name: caddy_tourism
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tourism_platform

volumes:
  redis_data:
  caddy_data:
  caddy_config:
