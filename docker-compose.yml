version: '3.8'

services:
  tourism_platform:
    build: .
    container_name: tourism_platform
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KB_DIR=/kb_data
      - KNOWLEDGE_INDEX_PATH=/app/generated/knowledge_index.json
      - KNOWLEDGE_BASE_URL=${KNOWLEDGE_BASE_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-llama-3.1-8b-instant}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.groq.com/openai/v1}
    depends_on:
      - redis
    volumes:
      - ./knowledge_bases:/kb_data

  redis:
    image: redis:6.2
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
