services:
  tourism_platform:
    build: .
    container_name: tourism_platform
    ports:
      - "127.0.0.1:8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # Docker-specific overrides (these override .env values)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KB_DIR=/kb_data
      - KNOWLEDGE_INDEX_PATH=/app/generated/knowledge_index.json
    depends_on:
      - redis
    volumes:
      - ./knowledge_bases:/kb_data

  redis:
    image: redis:6.2
    container_name: redis_tourism
    # No ports exposed to host — only accessible within Docker network
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:2
    container_name: caddy_tourism
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tourism_platform

volumes:
  redis_data:
  caddy_data:
  caddy_config:
