# cc-connect configuration for Tourism Platform
# Uses tmux agent type — spawns our Python CLI wrapper
# Telegram via Long Polling (no public IP needed!)
#
# KEY: prompt_pattern must match TB> prompt marker that
# tourism_bot_cli.py prints after each response

language = "en"

[log]
level = "info"

[display]
mode = "compact"
thinking_messages = false
tool_messages = false

[instant_reply]
enabled = true
content = "🤔 Подбираем ответ из базы знаний..."

[[projects]]
name = "tourism-bot"
admin_from = "*"
allow_from = "*"
reset_on_idle_mins = 0

[projects.agent]
type = "tmux"

[projects.agent.options]
session = "tourism-bot"
auto_create = true
init_command = "python3 /opt/tourism_platform/tourism_bot_cli.py"
startup_wait_ms = 3000
prompt_pattern = 'TB>\s*$'
poll_interval_ms = 200

[[projects.platforms]]
type = "telegram"

[projects.platforms.options]
token = "8530023333:AAHHlAvuY4zu7FxSq38ydJc0vQN5UEA1uPo"

